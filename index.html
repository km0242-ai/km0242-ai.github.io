<head>
</head>
<body>
  <h1 class = title>
    <span>Me</span><span>mo</span><span>ry</span>
    <span>Ga</span><span>me</span>
  </h1>
<div class = page>
  <div class="c red"type="checkbox" class="box" data-color="red"></div>
  <div class="c blue"type="checkbox" class="box" data-color="blue"></div>
  <div class="c yellow" type="checkbox" class="box" data-color="yellow"></div>
  <div class="c green" type="checkbox" class="box" data-color="green">
</div>
  <div class="trail-container"></div>
  </div>
  <style>
  .title{
  text-align: center;
  span:nth-child(1) {color: red;}
  span:nth-child(2) {color: blue;}
  span:nth-child(3) {color: green;}
  span:nth-child(4) {color: orange;}
  span:nth-child(5) {color: purple;}
}
.page {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows:  1fr 1fr;
  min-height: 80vh;
  gap: 10px;
}

input{display: none;}

.red {background: red}
.blue {background: blue}
.yellow {background: yellow}
.green {background: green}

.c {border: 2px solid;}

.red { animation: flash1 10s linear forwards; }
.blue { animation: flash2 10s linear forwards; }
.yellow { animation: flash3 10s linear forwards;}
.green { animation: flash4 10s linear forwards; }

@keyframes flash1 {
  0%, 19%, 69%, 71%, 21%, 100% { background: red; }
  20%, 70% { background: #333; }
}

@keyframes flash2 {
  0%, 39%, 41%, 54%, 56%, 100% { background: blue; }
  40%, 55% { background: #333; }
}

@keyframes flash3 {
  0%, 29%, 31%, 59%, 61%, 74%, 76%, 100% { background: yellow; }
  30%, 60%, 75% { background: #333; }
}

@keyframes flash4 {
  0%, 24%, 26%, 34%, 36%, 79%, 81%, 100% { background: green; }
  25%, 35%, 80% { background: #333; }
}

.trail {
  position: fixed;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  animation: fade 0.6s linear forwards;
}

@keyframes fade {
  to {
    opacity: 0;
    transform: scale(0.3);
  }
}
</style>
<script>
const pattern = ["red","green","yellow","green", "blue", "blue", "yellow", "red", "yellow", "green"];
let player = [];

document.querySelectorAll(".c").forEach(box => {
  box.onclick = () => {
    player.push(box.dataset.color);

    let i = player.length - 1;

    if (player[i] !== pattern[i]) {
      alert("wrong");
      player = [];
    }

    if (player.length === pattern.length) {
      alert("win");
      player = [];
    }
  };
});
document.addEventListener("mousemove", e => {
  const dot = document.createElement("div");
  dot.className = "trail";

  dot.style.left = e.clientX + "px";
  dot.style.top = e.clientY + "px";

  dot.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;

  document.body.appendChild(dot);

  setTimeout(() => dot.remove(), 600);
});
</script>
</body>
